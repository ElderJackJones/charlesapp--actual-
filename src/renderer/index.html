<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charles</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="./script.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    :root {
  --bulma-primary-h: 187deg;
  --bulma-primary-s: 78%;
  --bulma-primary-l: 74%;
  --bulma-link-h: 194deg;
  --bulma-link-s: 95%;
  --bulma-link-l: 29%;
  --bulma-info-h: 303deg;
  --bulma-info-s: 56%;
  --bulma-info-l: 79%;
  --bulma-success-h: 165deg;
  --bulma-success-s: 100%;
  --bulma-success-l: 40%;
  --bulma-danger-h: 333deg;
  --bulma-danger-s: 84%;
  --bulma-danger-l: 47%;
}



.level-item {
  margin: 0% !important;
  padding: 1% !important;
}
.box {
  border-radius: 12px;
  padding: 20px;
  margin-left: 5% !important;
  margin-right: 5% !important;
}
::-webkit-scrollbar {
    display: none;
}


  </style>
</head>
<body>
  <section class="section">
    <div class="container">
      <div class="has-text-centered">
        <h1 class="title">Welcome to Charles!</h1>
      </div>
    </div>
  </section>
      <section x-data="{
        messageOpen: false,
        messageLoading: false,
        modalTitle: '',
        modalMessage: '',
        modalColor: 'is-info',
        reportLoading: false,
        testLoading: false,
        settings: false,
        loadingZones: false,
      }" id="dataEnv">
      <div class="columns is-centered">
      <div class="column is-full" style="min-width: max-content;">
      <div class="box">
        <nav class="level">
      <!-- Button Grid -->

          <div x-html="(await axios.get('./components/modal.html')).data"></div>
          <div x-html="(await axios.get('./components/settings.html')).data"></div>
        
          <div class="level-item has-text-centered">

            <button class=" button is-primary is-responsive " @click="messageOpen = true, 
            messageLoading = true, 
            modalTitle = 'Message in Progress', 
            modalMessage = `Please don't close the app while this is loading...`,
            modalColor = 'is-info'"
            :class="messageLoading ? 'is-loading' : ''">

              <span class="icon is-medium ">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-send-fill" viewBox="0 0 16 16">
                  <path d="M15.964.686a.5.5 0 0 0-.65-.65L.767 5.855H.766l-.452.18a.5.5 0 0 0-.082.887l.41.26.001.002 4.995 3.178 3.178 4.995.002.002.26.41a.5.5 0 0 0 .886-.083zm-1.833 1.89L6.637 10.07l-.215-.338a.5.5 0 0 0-.154-.154l-.338-.215 7.494-7.494 1.178-.471z"/>
                </svg>
              </span>
              <span>
                Send a Charles Message
              </span>
            </button>
          </div>
          <div class="level-item has-text-centered">
          <button class=" button is-primary is-responsive" @click="messageOpen = true,
          reportLoading = true,
          modalTitle = 'Generating SML Report',
          modalMessage = `Your SML report will open up in a new window, please don't close the app while you wait.`,
          modalColor = 'is-danger'
          " :class="reportLoading ? 'is-loading' : ''">
            <span class="icon is-medium ">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-clipboard-data-fill" viewBox="0 0 16 16">
                <path d="M6.5 0A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0zm3 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5z"/>
                <path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1A2.5 2.5 0 0 1 9.5 5h-3A2.5 2.5 0 0 1 4 2.5zM10 8a1 1 0 1 1 2 0v5a1 1 0 1 1-2 0zm-6 4a1 1 0 1 1 2 0v1a1 1 0 1 1-2 0zm4-3a1 1 0 0 1 1 1v3a1 1 0 1 1-2 0v-3a1 1 0 0 1 1-1"/>
              </svg>
            </span>
            <span>
              SML Report
            </span>
          </button>
          </div>
          <div class="level-item has-text-centered">
          <button class=" button is-primary is-responsive" @click="
          messageOpen = true,
          modalTitle = 'Test Run',
          modalMessage = `Charles is about to test run himself, please stay active on this window for prompts.`,
          modalColor = 'is-warning',
          testLoading = true"
          :class="testLoading ? 'is-loading' : ''">
            <span class="icon is-medium ">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-rocket-takeoff-fill" viewBox="0 0 16 16">
                <path d="M12.17 9.53c2.307-2.592 3.278-4.684 3.641-6.218.21-.887.214-1.58.16-2.065a3.6 3.6 0 0 0-.108-.563 2 2 0 0 0-.078-.23V.453c-.073-.164-.168-.234-.352-.295a2 2 0 0 0-.16-.045 4 4 0 0 0-.57-.093c-.49-.044-1.19-.03-2.08.188-1.536.374-3.618 1.343-6.161 3.604l-2.4.238h-.006a2.55 2.55 0 0 0-1.524.734L.15 7.17a.512.512 0 0 0 .433.868l1.896-.271c.28-.04.592.013.955.132.232.076.437.16.655.248l.203.083c.196.816.66 1.58 1.275 2.195.613.614 1.376 1.08 2.191 1.277l.082.202c.089.218.173.424.249.657.118.363.172.676.132.956l-.271 1.9a.512.512 0 0 0 .867.433l2.382-2.386c.41-.41.668-.949.732-1.526zm.11-3.699c-.797.8-1.93.961-2.528.362-.598-.6-.436-1.733.361-2.532.798-.799 1.93-.96 2.528-.361s.437 1.732-.36 2.531Z"/>
                <path d="M5.205 10.787a7.6 7.6 0 0 0 1.804 1.352c-1.118 1.007-4.929 2.028-5.054 1.903-.126-.127.737-4.189 1.839-5.18.346.69.837 1.35 1.411 1.925"/>
              </svg>
            </span>
            <span>
              Test Run Charles
            </span>
          </button>
        </div>
        <div class="level-item has-text-centered">
          <button class=" button is-primary is-responsive" @click="settings = true, loadingZones = true">
            <span class="icon is-medium ">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-gear-wide-connected" viewBox="0 0 16 16">
                <path d="M7.068.727c.243-.97 1.62-.97 1.864 0l.071.286a.96.96 0 0 0 1.622.434l.205-.211c.695-.719 1.888-.03 1.613.931l-.08.284a.96.96 0 0 0 1.187 1.187l.283-.081c.96-.275 1.65.918.931 1.613l-.211.205a.96.96 0 0 0 .434 1.622l.286.071c.97.243.97 1.62 0 1.864l-.286.071a.96.96 0 0 0-.434 1.622l.211.205c.719.695.03 1.888-.931 1.613l-.284-.08a.96.96 0 0 0-1.187 1.187l.081.283c.275.96-.918 1.65-1.613.931l-.205-.211a.96.96 0 0 0-1.622.434l-.071.286c-.243.97-1.62.97-1.864 0l-.071-.286a.96.96 0 0 0-1.622-.434l-.205.211c-.695.719-1.888.03-1.613-.931l.08-.284a.96.96 0 0 0-1.186-1.187l-.284.081c-.96.275-1.65-.918-.931-1.613l.211-.205a.96.96 0 0 0-.434-1.622l-.286-.071c-.97-.243-.97-1.62 0-1.864l.286-.071a.96.96 0 0 0 .434-1.622l-.211-.205c-.719-.695-.03-1.888.931-1.613l.284.08a.96.96 0 0 0 1.187-1.186l-.081-.284c-.275-.96.918-1.65 1.613-.931l.205.211a.96.96 0 0 0 1.622-.434zM12.973 8.5H8.25l-2.834 3.779A4.998 4.998 0 0 0 12.973 8.5m0-1a4.998 4.998 0 0 0-7.557-3.779l2.834 3.78zM5.048 3.967l-.087.065zm-.431.355A4.98 4.98 0 0 0 3.002 8c0 1.455.622 2.765 1.615 3.678L7.375 8zm.344 7.646.087.065z"/>
              </svg>
            </span>
            <span>
              Settings
            </span>
          </button>
        </div>
        </nav>
      </div>
      </div>
      </div>
  </section>
</body>
</html>
